set-option -g status-position top

# Enable status bar
set-option -g status on

# Status bar styling: green normally, yellow when prefix is active
set-option -g status-style "#{?client_prefix,bg=yellow fg=black,bg=green fg=black}"

# Left status: show prefix indicator
set-option -g status-left "#{?client_prefix,#[reverse]<Prefix>#[noreverse] ,}"
set-option -g status-left-length 20

# Right status: show session name, window, pane
set-option -g status-right "[#S:#I:#P]"
set-option -g status-right-length 40
